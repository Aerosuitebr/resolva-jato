<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Resolva Jato: plataforma freemium para busca inteligente, documentos, tarefas e produtividade em alta velocidade."
    />
    <title>Resolva Jato | Plataforma para resolver tarefas em segundos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <dialog id="login-dialog" class="auth-dialog" aria-labelledby="auth-title">
      <form id="auth-form" class="auth-card" method="dialog">
        <div class="auth-card__header">
          <span class="brand-mark">RJ</span>
          <div>
            <p class="eyebrow">Acesso ao workspace</p>
            <h2 id="auth-title">Entre para experimentar o Resolva Jato</h2>
          </div>
          <button class="icon-button" type="button" id="auth-close" aria-label="Fechar">x</button>
        </div>
        <label>
          Nome
          <input id="auth-name" name="name" type="text" value="Wellem Lyra" autocomplete="name" />
        </label>
        <label>
          E-mail
          <input id="auth-email" name="email" type="email" value="demo@resolvajato.local" autocomplete="email" required />
        </label>
        <label>
          Senha
          <input id="auth-password" name="password" type="password" value="123456" autocomplete="current-password" minlength="6" required />
        </label>
        <div class="auth-actions">
          <button class="secondary-action" type="button" id="auth-login">Entrar</button>
          <button class="primary-action" type="submit">Criar conta grátis</button>
        </div>
        <p id="auth-feedback" class="auth-feedback">Use os dados preenchidos para entrar em modo demonstração.</p>
      </form>
    </dialog>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
