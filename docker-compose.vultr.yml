# Overlay Vultr — mesmo servidor do Aerosuite (Cloudflare Tunnel, sem Caddy).
# Uso:
#   docker compose --env-file .env.production \
#     -f docker-compose.yml -f docker-compose.vultr.yml up -d --build
#
# Portas no host (só localhost):
#   app Next.js     → 127.0.0.1:3000
#   Evolution API   → 127.0.0.1:18083  (Aerosuite Evolution usa 18082)

services:
  caddy:
    profiles:
      - never

  app:
    ports:
      - '127.0.0.1:3000:3000'
